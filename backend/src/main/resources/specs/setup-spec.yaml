version: 1
source_of_truth:
  allowed_sources:
    - hegemony_base_rules
    - hegemony_crisis_and_control_expansion
  external_sources_allowed: false

unknown_marker: UNKNOWN

game_modes:
  source_document: [hegemony_base_rules, hegemony_crisis_and_control_expansion]
  source_section: setup_player_modes_and_counts
  source_status: explicit_from_rules
  human_players_only:
    supported_player_counts: [2, 3, 4]
  with_automa:
    supported_player_counts: [2, 3, 4]
    modes: [simple, complex]

player_count_config:
  source_document: [hegemony_base_rules, hegemony_crisis_and_control_expansion]
  source_section: setup_active_classes_by_player_count
  source_status: explicit_from_rules
  2:
    active_player_classes: [worker, capitalist]
    state_player_active: false
    board_state_note: state_sector_treasury_and_public_services_exist
  3:
    active_player_classes: [worker, middle_class, capitalist]
    state_player_active: false
    board_state_note: state_sector_treasury_and_public_services_exist
  4:
    active_player_classes: [worker, middle_class, capitalist, state]
    state_player_active: true

initial_policy_courses:
  source_document: [hegemony_base_rules, hegemony_crisis_and_control_expansion]
  source_section: setup_initial_policy_courses
  source_status: explicit_from_rules
  policy_1_fiscal: C
  policy_2_labor_market: B
  policy_3_taxation: A
  policy_4_healthcare_and_benefits: B
  policy_5_education: C
  policy_6_foreign_trade: B
  policy_7_immigration: B

