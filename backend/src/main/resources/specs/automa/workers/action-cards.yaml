automa_action_cards_partial:
  - card_no: 1
    automa: WORKERS
    checks: [ASSIGN_WORKERS, BUY_GOODS_AND_SERVICES, PROPOSE_BILL, PLACE_STRIKES]
    policy_tags: [POLICY_FISCAL, POLICY_LABOR_MARKET]
    bonus:
      trigger: assign_workers_this_turn
      effect: { type: owner_pays_per_assigned_worker, amount_per_worker: 4, max_unemployed: 4 }
      raw_text_ru: "2Б/2В: вы можете назначить не более 4 безработных в этот ход. Получите от владельца предприятия по 4 ₩ за каждого работника, назначенного на предприятие таким образом."
    special_action:
      type: REPLACE_NON_WORKER_VOTE_CUBES_WITH_WORKER
      params: { cubes_to_replace: 3 }
      conditions: []
      raw_text_ru: "Берите из мешочка кубики для голосования, пока не возьмёте 3 кубика других классов. Замените их своими и верните все взятые кубики, кроме заменённых, в мешочек."
    source: { image_ref: "R:/d.i/раб/photo_2026-05-09_11-08-12.jpg", transcription_confidence: high }
    raw_text_ru: "Карта простой автомы рабочего класса №1."

  - card_no: 2
    automa: WORKERS
    checks: [ASSIGN_WORKERS, PROPOSE_BILL, BUY_GOODS_AND_SERVICES, PLACE_STRIKES]
    policy_tags: [POLICY_TAX, POLICY_FISCAL]
    bonus:
      trigger: assign_workers_this_turn
      effect: { type: build_cooperative_farm_then_assign }
      raw_text_ru: "Если вы назначаете работников в этот ход, сначала постройте кооперативное хозяйство и назначьте работников туда, если возможно."
    special_action:
      type: BUY_INFLUENCE_FROM_STATE_OR_ADD_VOTING_CUBES
      params: { amount: 3, cost_each: 5, cubes_per_unbought: 2 }
      conditions: []
      raw_text_ru: "Купите у государства 3 влияния по 5 ₩ за каждый. За каждое влияние, которое вы не смогли купить, добавьте по 2 кубика для голосования в мешок."
    source: { image_ref: "R:/d.i/раб/photo_2026-05-09_11-08-16.jpg", transcription_confidence: high }
    raw_text_ru: "Карта простой автомы рабочего класса №2."

  - card_no: 3
    automa: WORKERS
    checks: [BUY_GOODS_AND_SERVICES, PROPOSE_BILL, ASSIGN_WORKERS, PLACE_STRIKES]
    policy_tags: [POLICY_FISCAL, POLICY_MIGRATION]
    bonus:
      trigger: buy_goods_and_services_this_turn
      effect: { type: public_services_only_state_pays_per_unemployed, amount_per_unemployed: 5 }
      raw_text_ru: "4А/4Б: вы можете покупать только государственные услуги в этот ход. Если покупаете их, сначала получите от государства по 5 ₩ за каждого своего безработного."
    special_action:
      type: DRAW_SIX_RETURN_WORKER_CUBES_DISCARD_OTHERS
      params: { draw_count: 6 }
      conditions: []
      raw_text_ru: "Возьмите из мешочка 6 кубиков для голосования. Верните все взятые кубики рабочего класса обратно в мешочек, остальные сбросьте."
    source: { image_ref: "R:/d.i/раб/photo_2026-05-09_11-08-19.jpg", transcription_confidence: high }
    raw_text_ru: "Карта простой автомы рабочего класса №3."

  - card_no: 4
    automa: WORKERS
    checks: [BUY_GOODS_AND_SERVICES, PROPOSE_BILL, ASSIGN_WORKERS, PLACE_STRIKES]
    policy_tags: [POLICY_FISCAL, POLICY_LABOR_MARKET]
    bonus:
      trigger: buy_goods_and_services_this_turn
      effect: { type: state_sells_education_half_price_round_up }
      raw_text_ru: "В этот ход государство продаёт образование за 1/2 стоимости, округляя вверх."
    special_action:
      type: ADD_WORKER_VOTING_CUBES_EQUAL_POPULATION
      params: {}
      conditions: []
      raw_text_ru: "Добавьте в мешочек кубики для голосования в количестве, равном численности своего населения."
