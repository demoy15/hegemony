$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://hegemony.local/specs/setup-spec.schema.yaml"
title: "Hegemony Setup Spec Schema v1.2"
type: object
required:
  - version
  - source_of_truth
  - unknown_marker
  - game_modes
  - player_count_config
  - initial_policy_courses
  - initial_board_state
  - initial_public_resources
  - initial_voting_bag
  - initial_player_state
  - initial_automa_state
properties:
  version:
    type: [number, string]
  source_of_truth:
    type: object
    required: [allowed_sources, external_sources_allowed]
    properties:
      allowed_sources:
        type: array
        minItems: 1
        items:
          type: string
      external_sources_allowed:
        type: boolean
  unknown_marker:
    type: string
    enum: [UNKNOWN]

  game_modes:
    type: object
    required: [human_players_only, with_automa]
  player_count_config:
    type: object
    required: ["2", "3", "4"]
  initial_policy_courses:
    type: object
    required:
      - policy_1_fiscal
      - policy_2_labor_market
      - policy_3_taxation
      - policy_4_healthcare_and_benefits
      - policy_5_education
      - policy_6_foreign_trade
      - policy_7_immigration
    properties:
      policy_1_fiscal: { $ref: "#/$defs/policyCourse" }
      policy_2_labor_market: { $ref: "#/$defs/policyCourse" }
      policy_3_taxation: { $ref: "#/$defs/policyCourse" }
      policy_4_healthcare_and_benefits: { $ref: "#/$defs/policyCourse" }
      policy_5_education: { $ref: "#/$defs/policyCourse" }
      policy_6_foreign_trade: { $ref: "#/$defs/policyCourse" }
      policy_7_immigration: { $ref: "#/$defs/policyCourse" }

  initial_board_state:
    type: object
    required:
      - capitalist_starting_enterprises
      - state_enterprises_setup
      - starting_public_services_by_player_count
      - round_marker
      - tax_multiplier
      - vp_marker_each_player
      - state_treasury
  initial_public_resources:
    type: object
  initial_voting_bag:
    type: object
    required: [cubes_added_to_bag_at_start]
    properties:
      cubes_added_to_bag_at_start:
        type: object
        required: [worker, middle_class, capitalist]
        properties:
          worker: { type: integer }
          middle_class: { type: integer }
          capitalist: { type: integer }
  initial_player_state:
    type: object
    required: [worker, capitalist, middle_class, state]
  initial_automa_state:
    type: object
    required: [worker, capitalist, middle_class]

  unknowns_classification:
    type: object
    additionalProperties:
      type: array
      items:
        type: string

$defs:
  policyCourse:
    type: string
    enum: [A, B, C]
  sourceStatus:
    type: string
    enum: [explicit_from_rules, derived_from_rules, unknown]
