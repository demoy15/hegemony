services:
  backend:
    pull_policy: build
    build:
      context: ./backend
      dockerfile: Dockerfile
      no_cache: true
    ports:
      - "8080:8080"
    environment:
      HEGEMONY_SAVE_DIR: /app/data/saves
    volumes:
      - ./data/saves:/app/data/saves
    restart: unless-stopped

  frontend:
    pull_policy: build
    build:
      context: ./frontend
      dockerfile: Dockerfile
      no_cache: true
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
